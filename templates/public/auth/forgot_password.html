{% extends 'public/base.html' %}
{% block title %}{{ _('Forgot Password') }} - Weilight Harbor{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4" style="color: var(--color-primary);">
            <i data-lucide="key-round" style="width:48px;height:48px"></i>
        </div>
        <h4 class="auth-title">{{ _('Reset Password') }}</h4>
        <p class="auth-subtitle">{{ _('Verify your phone number and set a new password') }}</p>

        <form method="POST" action="/auth/forgot-password">
            <div class="mb-3">
                <label class="form-label small fw-medium">{{ _('Username or Email') }}</label>
                <input type="text" name="account" class="form-control wl-form-control" required
                       placeholder="{{ _('Enter your username or email') }}">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-medium">{{ _('Phone Number') }}</label>
                <input type="tel" name="phone" id="resetPhone" class="form-control wl-form-control" required
                       minlength="6" maxlength="20" placeholder="{{ _('Enter the phone number on your account') }}">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-medium">{{ _('Phone Verification Code') }}</label>
                <div class="input-group">
                    <input type="text" name="verification_code" class="form-control wl-form-control" required
                           inputmode="numeric" minlength="6" maxlength="6" placeholder="{{ _('6-digit code') }}">
                    <button type="button" class="btn btn-outline-secondary" id="sendResetCode">
                        {{ _('Send Code') }}
                    </button>
                </div>
                <div id="resetCodeMessage" class="small text-muted mt-1"></div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-medium">{{ _('New Password') }}</label>
                <input type="password" name="password" class="form-control wl-form-control" required
                       minlength="6" placeholder="{{ _('Enter a new password') }}">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-medium">{{ _('Confirm New Password') }}</label>
                <input type="password" name="confirm_password" class="form-control wl-form-control" required
                       minlength="6" placeholder="{{ _('Confirm your new password') }}">
            </div>
            <button type="submit" class="btn btn-wl-primary w-100 mb-3">
                <i data-lucide="check" style="width:16px;height:16px;"></i>
                {{ _('Reset Password') }}
            </button>
        </form>
        <p class="text-center small text-muted">
            <a href="/auth/login">{{ _('Back to Login') }}</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='public/js/auth.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    initPhoneCodeSender({
        phoneSelector: '#resetPhone',
        buttonSelector: '#sendResetCode',
        messageSelector: '#resetCodeMessage'
    });
});
</script>
{% endblock %}
