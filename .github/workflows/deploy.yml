name: Deploy Weilight Harbor

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      JUMPER_USER: ${{ secrets.JUMPER_USER }}
      JUMPER_HOST: ${{ secrets.JUMPER_HOST }}
      JUMPER_PASSWORD: ${{ secrets.JUMPER_PASSWORD }}
      JUMPER_TOTP_SECRET: ${{ secrets.JUMPER_TOTP_SECRET }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_PASSWORD: ${{ secrets.VM_PASSWORD }}

    steps:
      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y expect
          python3 -m pip install --upgrade pip pyotp

      - name: Deploy on VM through jump host
        shell: bash
        run: |
          set -euo pipefail

          TOTP="$(python3 - <<'PY'
import os
import pyotp

secret = os.environ["JUMPER_TOTP_SECRET"]
print(pyotp.TOTP(secret).now())
PY
)"
          export TOTP

          expect <<'EOF'
          set timeout 900
          log_user 1

          spawn ssh -tt -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $env(JUMPER_USER)@$env(JUMPER_HOST)
          expect {
            -re "(?i)password" {
              send "$env(JUMPER_PASSWORD)\r"
              exp_continue
            }
            -re "(?i)verification" {
              send "$env(TOTP)\r"
              exp_continue
            }
            -re {[$#] ?$} { }
            eof {
              exit 1
            }
          }

          send "printf 'JUMPER_READY\\n'\r"
          expect "JUMPER_READY"

          send "ssh -tt -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $env(VM_USER)@$env(VM_HOST) \"cd ~/weilight-harbor && git pull origin main && bash vm_update.sh && printf 'DEPLOY_DONE\\n'\"\r"
          expect {
            -re "(?i)password" {
              send "$env(VM_PASSWORD)\r"
              exp_continue
            }
            "DEPLOY_DONE" { }
            eof {
              exit 1
            }
          }

          send "exit\r"
          expect eof
          EOF
