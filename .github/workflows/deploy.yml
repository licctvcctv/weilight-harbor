name: Deploy Weilight Harbor

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      JUMPER_USER: ${{ secrets.JUMPER_USER }}
      JUMPER_HOST: ${{ secrets.JUMPER_HOST }}
      JUMPER_PASSWORD: ${{ secrets.JUMPER_PASSWORD }}
      JUMPER_TOTP_SECRET: ${{ secrets.JUMPER_TOTP_SECRET }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_PASSWORD: ${{ secrets.VM_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install deployment tools
        run: |
          sudo apt-get update
          sudo apt-get install -y expect curl git
          python3 -m pip install --upgrade pip pyotp

      - name: Deploy on VM through jump host
        shell: bash
        env:
          JUMPER_PASS: ${{ secrets.JUMPER_PASSWORD }}
          TOTP_SECRET: ${{ secrets.JUMPER_TOTP_SECRET }}
          VM_PASS: ${{ secrets.VM_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x ./deploy.sh
          ./deploy.sh --quiet
