<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1600" viewBox="0 0 2400 1600">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 40px Arial, sans-serif; fill: #000000; }
      .subtitle { font: 400 20px Arial, sans-serif; fill: #000000; }
      .entity { fill: #ffffff; stroke: #000000; stroke-width: 3; rx: 10; }
      .entity-main { fill: #ffffff; stroke: #000000; stroke-width: 4; rx: 10; }
      .relationship { fill: #ffffff; stroke: #000000; stroke-width: 3; }
      .attribute { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .attribute-key { fill: #ffffff; stroke: #000000; stroke-width: 2.5; }
      .entity-text { font: 700 22px Arial, sans-serif; fill: #000000; text-anchor: middle; dominant-baseline: middle; }
      .rel-text { font: 700 17px Arial, sans-serif; fill: #000000; text-anchor: middle; dominant-baseline: middle; }
      .attr-text { font: 15px Arial, sans-serif; fill: #000000; text-anchor: middle; dominant-baseline: middle; }
      .line { stroke: #000000; stroke-width: 2.2; fill: none; }
      .cardinality { font: 700 17px Arial, sans-serif; fill: #000000; text-anchor: middle; }
      .note { font: 18px Arial, sans-serif; fill: #000000; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2400" height="1600"/>
  <text class="title" x="1200" y="62" text-anchor="middle">Weilight Harbor Chen ER Diagram</text>
  <text class="subtitle" x="1200" y="96" text-anchor="middle">Rectangles = entities, ovals = attributes, diamonds = relationships</text>

