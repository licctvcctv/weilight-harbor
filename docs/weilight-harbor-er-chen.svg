  <text class="note" x="95" y="1510">Core entities shown from SQLAlchemy models. Admin logs, photos, dictionaries, confessions, and sensitive words are supporting tables and omitted for readability.</text>
  <text class="note" x="95" y="1542">Cardinality summary: one user can create many campaigns/posts/journal entries/requests; one campaign receives many donations; RBAC is many-to-many.</text>
</svg>
